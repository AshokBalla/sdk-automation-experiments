name: SDK Node.js tests

on:
  push:
    paths:
      - 'split-repos/sdk-automation-experiments/**'
  pull_request:
    paths:
      - 'split-repos/sdk-automation-experiments/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies and run tests
        working-directory: split-repos/sdk-automation-experiments
        run: |
          npm ci
          npm test
